name: d_rocket_builder
description: >
  build_runner codegen for the d_rocket framework:
  generates @Serializable, @RestClient, @Table handlers
  and the central initializeD() registry.
version: 2.0.0

repository: https://github.com/torogoz-tech/d_rocket_builder
homepage: https://github.com/torogoz-tech/d_rocket_builder
issue_tracker: https://github.com/torogoz-tech/d_rocket_builder/issues
documentation: https://github.com/torogoz-tech/d_rocket_builder/blob/main/README.md

topics:
  - codegen
  - build-runner
  - d-rocket
  - source-gen

environment:
  sdk: ^3.6.0

platforms:
  android:
  ios:
  linux:
  macos:
  web:
  windows:

dependencies:
  d_rocket: ^2.0.0
  d_rocket_lints: ^2.0.0
  # 2.0.0 — bumped 9.0.0 → 10.0.1 in
  # lockstep with `d_rocket_lints` (which
  # moved to analysis_server_plugin ^0.3.7
  # in Phase 8.7). analyzer 10.0.2+ is gated
  # by d_rocket's flutter SDK pinning
  # meta to 1.17.0.
  analyzer: ^10.0.1
  build: ^4.0.0
  source_gen: ^4.0.0
  path: ^1.9.0
  meta: ^1.12.0
  glob: ^2.1.3

dev_dependencies:
  build_runner: ^2.4.13
  lints: ^6.0.0
  test: ^1.30.0
