name: d_rocket_builder
description: >
  `build_runner` codegen for the `d_rocket` framework:
  generates `@Serializable`, `@RestClient`, `@RocketTable`
  handlers and the central `initializeD()` registry.
version: 1.0.0

repository: https://github.com/torogoz-tech/d_rocket
homepage: https://github.com/torogoz-tech/d_rocket
issue_tracker: https://github.com/torogoz-tech/d_rocket/issues
documentation: https://github.com/torogoz-tech/d_rocket/blob/main/packages/d_rocket_builder/README.md

topics:
  - codegen
  - build-runner
  - d-rocket
  - source-gen

environment:
  sdk: ^3.6.0

platforms:
  android:
  ios:
  linux:
  macos:
  web:
  windows:

dependencies:
  d_rocket: ^1.0.0
  analyzer: ^8.0.0
  build: ^4.0.0
  source_gen: ^4.0.0
  path: ^1.9.0
  meta: ^1.12.0
  glob: ^2.1.3
  custom_lint_builder: ^0.8.1

dev_dependencies:
  build_runner: ^2.4.13
  lints: ^6.0.0
  test: ^1.30.0
